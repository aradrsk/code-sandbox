# Fly.io config for self-hosted Piston.
# Deploy with:
#   cd piston && fly launch --no-deploy --copy-config --name <your-app>
#   fly deploy
#
# After first deploy, install language packages (one-time) — see README in this dir.

app = "piston-aradrsk"
primary_region = "iad"

[build]
  image = "ghcr.io/engineer-man/piston"

[env]
  PISTON_BIND_ADDRESS = "0.0.0.0:2000"
  PISTON_LOG_LEVEL = "INFO"

[[services]]
  internal_port = 2000
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  [[services.ports]]
    port = 80
    handlers = ["http"]

[[mounts]]
  source = "piston_packages"
  destination = "/piston/packages"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
